services:
  postgres:
    image: postgres:16-alpine
    container_name: fairsplit-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fairsplit
    volumes:
      - fairsplit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fairsplit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fairsplit_pgdata:
