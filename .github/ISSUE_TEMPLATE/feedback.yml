name: Feedback
description: Share an idea, improvement, or general feedback
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feedback. Feature ideas and UX suggestions are welcome.

  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - Feature idea
        - UX / design improvement
        - General feedback
        - Question
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Your feedback
      description: What would you like to see improved or added?
      placeholder: Tell us what you were trying to do and what would make FairSplit better for you.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context (optional)
      description: Group size, use case, or anything else that helps.
      placeholder: e.g. Trip with 8 friends, mostly using Settle up on mobile.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I understand this is a public GitHub issue (do not include passwords or private data).
          required: true
