name: Bug report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve FairSplit. Please include as much detail as you can so we can reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: What went wrong?
      description: A clear description of the bug.
      placeholder: e.g. Recording a payment fails even though the amount is within the limit.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we see the same problem?
      placeholder: |
        1. Open group "..."
        2. Go to Settle up
        3. Turn Simplify debts on
        4. Tap Record payment
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Settle up / payments
        - Expenses
        - Balances
        - Groups / members
        - Login / account
        - Other
    validations:
      required: true

  - type: dropdown
    id: simplify-debts
    attributes:
      label: Was "Simplify debts" on in Settle up?
      options:
        - "Yes"
        - "No"
        - Not sure / not applicable
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & device (optional)
      placeholder: e.g. Chrome on Windows 11, Safari on iPhone 15

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording (optional)
      description: Drag and drop images into the comment box after you submit, or paste links here.
      placeholder: Add screenshots after submitting, or paste links.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues to avoid duplicates.
          required: true
